<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Griot Reels — Stories That Inspire. Legacies That Live.</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #d4a853;
  --gold-light: #f5e6c8;
  --gold-dark: #a07830;
  --black: #04030a;
  --surface: #0a0812;
  --muted: #64748b;
  --dim: #334155;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--black);
  color:#e2e8f0;
  font-family:'Cormorant Garamond',serif;
  min-height:100vh;
  overflow-x:hidden;
  cursor:default;
}

/* GRAIN OVERLAY */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.6;
}

/* AMBIENT GLOWS */
.glow-top{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;border-radius:50%;background:radial-gradient(ellipse,rgba(212,168,83,0.09) 0%,transparent 70%);pointer-events:none;z-index:0;}
.glow-left{position:fixed;bottom:0;left:-200px;width:500px;height:500px;border-radius:50%;background:radial-gradient(ellipse,rgba(167,139,250,0.04) 0%,transparent 70%);pointer-events:none;z-index:0;}
.glow-right{position:fixed;top:50%;right:-200px;width:400px;height:400px;border-radius:50%;background:radial-gradient(ellipse,rgba(244,114,182,0.04) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 48px;
  background:rgba(4,3,10,0.7);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(212,168,83,0.08);
}
.nav-logo{
  font-family:'Cinzel',serif;
  font-size:16px;font-weight:700;letter-spacing:6px;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-decoration:none;
}
.nav-links{display:flex;gap:32px;align-items:center;}
.nav-links a{
  color:var(--dim);font-size:10px;letter-spacing:3px;
  font-family:'Courier Prime',monospace;text-decoration:none;
  transition:color 0.3s;
}
.nav-links a:hover{color:var(--gold);}
.nav-cta{
  padding:8px 20px;
  border:1px solid rgba(212,168,83,0.4);
  color:var(--gold)!important;
  border-radius:2px;
  transition:all 0.3s!important;
}
.nav-cta:hover{background:rgba(212,168,83,0.1)!important;border-color:var(--gold)!important;}

/* HERO */
.hero{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:120px 24px 80px;
  text-align:center;
  overflow:hidden;
}

/* horizontal line accents */
.hero::before,.hero::after{
  content:'';position:absolute;left:50%;transform:translateX(-50%);
  width:1px;background:linear-gradient(to bottom,transparent,rgba(212,168,83,0.3),transparent);
}
.hero::before{top:0;height:80px;}
.hero::after{bottom:0;height:80px;}

.hero-badge{
  display:inline-block;
  padding:6px 20px;
  border:1px solid rgba(212,168,83,0.2);
  border-radius:20px;
  font-size:9px;letter-spacing:5px;
  color:var(--gold);
  font-family:'Courier Prime',monospace;
  background:rgba(212,168,83,0.05);
  margin-bottom:48px;
  animation:fadeUp 0.8s ease both;
}

/* LOGO IMAGE */
.logo-img{
  width:min(320px,70vw);
  height:min(320px,70vw);
  border-radius:50%;
  object-fit:cover;
  margin-bottom:48px;
  animation:fadeUp 0.9s ease 0.1s both;
  filter:drop-shadow(0 0 60px rgba(212,168,83,0.25)) drop-shadow(0 0 120px rgba(212,168,83,0.1));
  transition:filter 0.5s;
}
.logo-img:hover{filter:drop-shadow(0 0 80px rgba(212,168,83,0.4)) drop-shadow(0 0 160px rgba(212,168,83,0.15));}

.hero-tagline{
  font-size:11px;letter-spacing:6px;color:var(--muted);
  font-family:'Courier Prime',monospace;
  margin-bottom:24px;
  animation:fadeUp 1s ease 0.2s both;
}

.hero-sub{
  font-size:clamp(16px,3vw,22px);
  font-style:italic;
  color:rgba(245,230,200,0.6);
  font-weight:300;
  max-width:580px;
  line-height:1.9;
  margin-bottom:56px;
  animation:fadeUp 1s ease 0.35s both;
}

/* Decorative divider */
.divider-deco{
  display:flex;align-items:center;gap:16px;
  margin-bottom:56px;
  animation:fadeUp 1s ease 0.3s both;
}
.divider-deco span{
  display:block;height:1px;width:80px;
  background:linear-gradient(to right,transparent,rgba(212,168,83,0.4));
}
.divider-deco span:last-child{
  background:linear-gradient(to left,transparent,rgba(212,168,83,0.4));
}
.divider-deco i{
  font-size:14px;color:var(--gold);font-style:normal;
  opacity:0.7;
}

.hero-btns{
  display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  animation:fadeUp 1s ease 0.45s both;
}
.btn-primary{
  padding:16px 36px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);
  color:var(--black);text-decoration:none;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;font-weight:700;
  border-radius:2px;
  transition:all 0.3s;
  box-shadow:0 4px 24px rgba(212,168,83,0.2);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(212,168,83,0.35);}
.btn-ghost{
  padding:16px 36px;
  border:1px solid rgba(212,168,83,0.3);
  color:var(--gold);text-decoration:none;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;font-weight:600;
  border-radius:2px;
  transition:all 0.3s;
}
.btn-ghost:hover{background:rgba(212,168,83,0.08);border-color:var(--gold);transform:translateY(-2px);}

/* SCROLL INDICATOR */
.scroll-hint{
  position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:fadeUp 1s ease 0.6s both;
}
.scroll-hint span{font-size:9px;letter-spacing:3px;color:var(--dim);font-family:'Courier Prime',monospace;}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,rgba(212,168,83,0.4),transparent);animation:scrollPulse 2s ease infinite;}

/* SERIES SECTION */
.series-section{
  position:relative;z-index:1;
  padding:120px 24px;
  max-width:1100px;margin:0 auto;
}
.section-header{
  text-align:center;margin-bottom:80px;
}
.section-eyebrow{
  font-size:9px;letter-spacing:5px;color:var(--gold);
  font-family:'Courier Prime',monospace;
  margin-bottom:16px;display:block;
}
.section-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(22px,4vw,36px);
  color:var(--gold-light);
  letter-spacing:4px;font-weight:400;
  margin-bottom:16px;
}
.section-sub{
  font-size:16px;color:var(--muted);
  font-style:italic;font-weight:300;
  max-width:500px;margin:0 auto;line-height:1.8;
}

.series-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:2px;
}
.series-card{
  position:relative;overflow:hidden;
  padding:48px 36px;
  background:var(--surface);
  border:1px solid rgba(255,255,255,0.04);
  transition:all 0.4s;
  cursor:default;
}
.series-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 60%,rgba(212,168,83,0.04) 100%);
  opacity:0;transition:opacity 0.4s;
}
.series-card:hover::before{opacity:1;}
.series-card:hover{border-color:rgba(212,168,83,0.15);transform:translateY(-4px);}

.card-num{
  font-size:64px;font-weight:700;
  font-family:'Cinzel',serif;
  opacity:0.04;
  position:absolute;top:16px;right:24px;
  color:var(--gold);
  line-height:1;
}
.card-emoji{font-size:32px;margin-bottom:20px;display:block;}
.card-series-label{
  font-size:9px;letter-spacing:3px;
  font-family:'Courier Prime',monospace;
  margin-bottom:8px;display:block;opacity:0.6;
}
.card-title{
  font-family:'Cinzel',serif;
  font-size:18px;letter-spacing:3px;
  margin-bottom:16px;font-weight:700;
}
.card-ep-count{
  font-size:10px;letter-spacing:2px;
  font-family:'Courier Prime',monospace;
  color:var(--dim);margin-bottom:20px;display:block;
}
.card-desc{
  font-size:15px;color:var(--muted);
  line-height:1.8;font-style:italic;font-weight:300;
  margin-bottom:24px;
}
.card-hook{
  font-size:13px;
  color:rgba(245,230,200,0.5);
  font-style:italic;line-height:1.7;
  padding-top:20px;
  border-top:1px solid rgba(255,255,255,0.05);
}

/* STATS SECTION */
.stats-section{
  position:relative;z-index:1;
  border-top:1px solid rgba(212,168,83,0.08);
  border-bottom:1px solid rgba(212,168,83,0.08);
  padding:80px 24px;
  background:linear-gradient(to right,transparent,rgba(212,168,83,0.02),transparent);
}
.stats-inner{
  max-width:900px;margin:0 auto;
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:48px;text-align:center;
}
.stat-num{
  font-family:'Cinzel',serif;
  font-size:clamp(32px,5vw,48px);
  color:var(--gold);font-weight:700;
  display:block;margin-bottom:8px;
}
.stat-label{
  font-size:10px;letter-spacing:3px;
  color:var(--muted);
  font-family:'Courier Prime',monospace;
}

/* CTA SECTION */
.cta-section{
  position:relative;z-index:1;
  padding:120px 24px;
  text-align:center;
  max-width:700px;margin:0 auto;
}
.cta-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(20px,4vw,32px);
  color:var(--gold-light);
  letter-spacing:4px;font-weight:400;
  margin-bottom:24px;line-height:1.4;
}
.cta-desc{
  font-size:17px;color:var(--muted);
  font-style:italic;line-height:1.9;
  margin-bottom:48px;
}
.platforms{
  display:flex;justify-content:center;gap:16px;flex-wrap:wrap;
  margin-bottom:48px;
}
.platform-pill{
  padding:10px 24px;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;
  font-size:10px;letter-spacing:2px;
  color:var(--dim);
  font-family:'Courier Prime',monospace;
  text-decoration:none;
  transition:all 0.3s;
  background:rgba(255,255,255,0.02);
}
.platform-pill:hover{border-color:rgba(212,168,83,0.3);color:var(--gold);background:rgba(212,168,83,0.05);}

/* FOOTER */
footer{
  position:relative;z-index:1;
  border-top:1px solid rgba(255,255,255,0.05);
  padding:40px 48px;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;
}
.footer-logo{
  font-family:'Cinzel',serif;font-size:14px;
  letter-spacing:5px;font-weight:700;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-decoration:none;
}
.footer-links{display:flex;gap:24px;}
.footer-links a{
  color:var(--dim);font-size:10px;letter-spacing:2px;
  font-family:'Courier Prime',monospace;text-decoration:none;
  transition:color 0.3s;
}
.footer-links a:hover{color:var(--gold);}
.footer-copy{font-size:10px;color:rgba(255,255,255,0.08);font-family:'Courier Prime',monospace;letter-spacing:1px;}

/* ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes scrollPulse{
  0%,100%{opacity:0.3;}
  50%{opacity:0.8;}
}
@keyframes shimmer{
  0%{background-position:200% center;}
  100%{background-position:-200% center;}
}

/* Responsive */
@media(max-width:640px){
  nav{padding:16px 24px;}
  .nav-links a:not(.nav-cta){display:none;}
  footer{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
